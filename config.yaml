project:
  name: aws-autoscale-optimizer
  region: us-east-1

network:
  vpc_cidr: 10.10.0.0/16
  public_subnets:
    - name: pub-sub-1a
      cidr: 10.10.1.0/24
      az: us-east-1a
    - name: pub-sub-1b
      cidr: 10.10.2.0/24
      az: us-east-1b
  private_subnets:
    - name: pvt-sub-1a
      cidr: 10.10.10.0/24
      az: us-east-1a
    - name: pvt-sub-1b
      cidr: 10.10.11.0/24
      az: us-east-1b

compute:
  ami_ssm_path: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
  instance_type: t3.micro
  asg_min: 1
  asg_max: 2
  asg_desired: 1

automation:
  morning_shift:
    cron: "cron(30 1 * * ? *)"
    min_size: 2
    max_size: 7
    desired_capacity: 2
  evening_shift:
    cron: "cron(30 13 * * ? *)"
    min_size: 1
    max_size: 2
    desired_capacity: 1